<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ru Amsefeh l'ensemble de l'artisanat Medina</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Tajawal:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#C9943A;--gold-l:#E8B86D;--gold-d:#8B6420;
  --black:#080808;--dark:#111;--dark2:#181818;--dark3:#202020;--dark4:#2A2A2A;
  --white:#F7F4EE;--grey:#888;--grey2:#555;
  --green:#25D366;
  --ff-display:'Playfair Display',serif;
  --ff-ar:'Tajawal',sans-serif;
  --ff-body:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:var(--ff-body);overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:var(--gold-d);}

[dir="rtl"]{font-family:var(--ff-ar);}
[dir="rtl"] .nav-links{flex-direction:row-reverse;}
[dir="rtl"] .hero-left{text-align:right;}
[dir="rtl"] .hero-btns{flex-direction:row-reverse;}
[dir="rtl"] .footer-contact a{flex-direction:row-reverse;}
[dir="rtl"] .car-spec{flex-direction:row-reverse;}
[dir="rtl"] .step-content{text-align:right;}
[dir="rtl"] .testi-card{text-align:right;}
[dir="rtl"] .testi-stars{justify-content:flex-end;}
[dir="rtl"] .star-rating{justify-content:flex-end;}

/* ── PROGRESS BAR ── */
.progress-bar{position:fixed;top:0;left:0;height:2px;background:var(--gold);z-index:10000;width:0%;transition:width .1s ease;border-radius:0 2px 2px 0;}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:999;height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 5%;background:rgba(8,8,8,.96);backdrop-filter:blur(16px);border-bottom:1px solid rgba(201,148,58,.12);transition:all .4s cubic-bezier(.16,1,.3,1);}
nav.scrolled{height:58px;background:rgba(8,8,8,.98);box-shadow:0 4px 30px rgba(0,0,0,.5);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;cursor:pointer;}
/* ⚠️  اللوجو مستطيل بدل دائري */
.logo-emblem{width:70px;height:36px;overflow:hidden;border:1.5px solid var(--gold);flex-shrink:0;transition:all .4s cubic-bezier(.16,1,.3,1);border-radius:4px;}
nav.scrolled .logo-emblem{width:60px;height:30px;}
.logo-emblem img{width:100%;height:100%;object-fit:cover;}
.logo-text-wrap span{display:block;font-family:var(--ff-display);color:var(--gold);font-size:14px;letter-spacing:2px;font-weight:700;transition:font-size .4s;}
nav.scrolled .logo-text-wrap span{font-size:12px;}
.logo-text-wrap small{color:var(--grey);font-size:8px;letter-spacing:3px;text-transform:uppercase;}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none;}
.nav-links a{text-decoration:none;color:rgba(247,244,238,.65);font-size:12px;letter-spacing:1.8px;text-transform:uppercase;font-weight:500;transition:color .3s;position:relative;padding-bottom:2px;}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width .3s;}
.nav-links a:hover,.nav-links a.active{color:var(--gold);}
.nav-links a:hover::after,.nav-links a.active::after{width:100%;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-nav-cta{background:var(--gold);color:var(--black);padding:9px 20px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));white-space:nowrap;position:relative;overflow:hidden;}
.btn-nav-cta::before,.btn-primary::before,.btn-book-car::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,.2);transform:translate(-50%,-50%);transition:width .6s,height .6s;}
.btn-nav-cta:hover::before,.btn-primary:hover::before,.btn-book-car:hover::before{width:300px;height:300px;}
.btn-nav-cta:hover,.btn-primary:hover,.btn-book-car:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(201,148,58,.3);}
.btn-nav-cta:hover{background:var(--gold-l);}
.nav-wa{width:36px;height:36px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:transform .3s;flex-shrink:0;}
.nav-wa:hover{transform:scale(1.1);}
.nav-wa svg{width:18px;height:18px;fill:#fff;}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:5px;background:transparent;border:none;}
.burger span{width:22px;height:1.5px;background:var(--white);transition:all .3s;display:block;}
.mob-menu{display:none;position:fixed;top:68px;left:0;right:0;background:rgba(8,8,8,.99);z-index:998;padding:24px 5%;flex-direction:column;gap:4px;border-bottom:1px solid rgba(201,148,58,.15);}
.mob-menu.open{display:flex;}
.mob-menu a{color:rgba(247,244,238,.7);text-decoration:none;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.mob-menu a:hover{color:var(--gold);}

/* ── HERO ── */
#hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;padding-top:68px;}
.hero-bg{position:absolute;inset:0;}
.hero-bg img{width:100%;height:100%;object-fit:cover;opacity:1;filter:brightness(0.7);}
.hero-bg::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.25);}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(201,148,58,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,148,58,.03) 1px,transparent 1px);background-size:70px 70px;z-index:1;}
.hero-inner{position:relative;z-index:2;width:100%;max-width:1280px;margin:0 auto;padding:80px 5%;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:60px;}
.hero-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(201,148,58,.5);padding:6px 18px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:22px;background:rgba(0,0,0,.5);}
.hero-pill::before{content:'';width:6px;height:6px;background:var(--gold);border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
h1.hero-title{font-family:var(--ff-display);font-size:clamp(38px,5vw,72px);line-height:1.0;font-weight:700;margin-bottom:10px;text-shadow:0 2px 10px rgba(0,0,0,.5);}
h1.hero-title em{font-style:italic;color:var(--gold);display:block;animation:glow 2s ease-in-out infinite alternate;}
@keyframes glow{0%{text-shadow:0 0 10px rgba(201,148,58,.3),0 0 20px rgba(201,148,58,.1);}100%{text-shadow:0 0 20px rgba(201,148,58,.6),0 0 40px rgba(201,148,58,.3),0 0 60px rgba(201,148,58,.1);}}
.hero-sub{color:rgba(247,244,238,.9);font-size:15px;line-height:1.85;margin-bottom:34px;max-width:500px;text-shadow:0 1px 4px rgba(0,0,0,.6);}
.hero-feats{display:flex;gap:20px;margin-bottom:38px;flex-wrap:wrap;}
.h-feat{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--white);text-shadow:0 1px 3px rgba(0,0,0,.7);}
.h-feat svg{width:14px;height:14px;fill:var(--gold);flex-shrink:0;}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;}
.btn-primary{background:var(--gold);color:var(--black);padding:14px 28px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;clip-path:polygon(0 0,calc(100% - 9px) 0,100% 9px,100% 100%,9px 100%,0 calc(100% - 9px));transition:all .4s cubic-bezier(.16,1,.3,1);display:inline-flex;align-items:center;gap:9px;white-space:nowrap;position:relative;overflow:hidden;}
.btn-primary svg{width:16px;height:16px;fill:var(--black);flex-shrink:0;}
.btn-outline{background:rgba(0,0,0,.4);color:var(--white);padding:14px 28px;font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:1px solid rgba(247,244,238,.3);cursor:pointer;transition:all .3s;backdrop-filter:blur(4px);white-space:nowrap;}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);background:rgba(0,0,0,.6);}
.hero-car-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
.hero-car-wrap img{width:100%;max-width:580px;filter:drop-shadow(0 20px 50px rgba(201,148,58,.35));animation:carfloat 5s ease-in-out infinite;}
@keyframes carfloat{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-10px) rotate(.3deg);}}
.hero-bottom-note{position:absolute;bottom:28px;left:5%;z-index:2;display:flex;align-items:center;gap:10px;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.8);}
.hero-bottom-note::before{content:'';width:28px;height:1px;background:var(--gold);}

/* ── LANG FLOAT ── */
.lang-float{position:fixed;bottom:26px;left:26px;z-index:997;display:flex;flex-direction:column;gap:8px;}
[dir="rtl"] .lang-float{left:auto;right:26px;}
.lang-flag-btn{width:44px;height:44px;border-radius:50%;border:2px solid rgba(201,148,58,.35);background:var(--dark3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .3s;line-height:1;padding:0;overflow:hidden;}
.lang-flag-btn:hover{border-color:var(--gold);transform:scale(1.1);box-shadow:0 0 15px rgba(201,148,58,.3);}
.lang-flag-btn.active{border-color:var(--gold);background:var(--dark);box-shadow:0 0 20px rgba(201,148,58,.4);}

/* ── STAR RATING ── */
.star-rating{display:flex;gap:6px;flex-direction:row;}
.star-rating .star{cursor:pointer;transition:all .2s;fill:var(--grey);}
.star-rating .star.active,.star-rating .star:hover{fill:var(--gold);transform:scale(1.2);}

/* ── SECTION HEADER ── */
.sec-head{text-align:center;margin-bottom:56px;}
.sec-label{display:inline-flex;align-items:center;gap:12px;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.sec-label::before,.sec-label::after{content:'';width:24px;height:1px;background:var(--gold-d);transition:width .6s cubic-bezier(.16,1,.3,1);}
.sec-head:hover .sec-label::before,.sec-head:hover .sec-label::after{width:48px;}
.sec-title{font-family:var(--ff-display);font-size:clamp(28px,3.8vw,52px);font-weight:700;line-height:1.1;}
.sec-title em{font-style:italic;color:var(--gold);}
.sec-sub{color:var(--grey);font-size:14px;margin-top:10px;}

/* ── CARS ── */
#cars{padding:96px 5%;background:var(--dark);}
.season-toggle{display:flex;justify-content:center;gap:0;margin-bottom:40px;border:1px solid rgba(201,148,58,.2);max-width:280px;margin-left:auto;margin-right:auto;}
.s-btn{flex:1;padding:10px 20px;background:transparent;border:none;color:var(--grey);font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .3s;font-family:var(--ff-body);white-space:nowrap;}
.s-btn.active{background:var(--gold);color:var(--black);}
.cars-grid{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:2px;}
.car-card{background:var(--dark3);padding:26px 22px;position:relative;overflow:hidden;cursor:pointer;transition:transform .35s;opacity:0;transform:translateY(60px);}
.car-card.vis{opacity:1;transform:translateY(0);transition:all .6s cubic-bezier(.16,1,.3,1);}
.car-card:nth-child(1).vis{transition-delay:.05s;}
.car-card:nth-child(2).vis{transition-delay:.1s;}
.car-card:nth-child(3).vis{transition-delay:.15s;}
.car-card:nth-child(4).vis{transition-delay:.2s;}
.car-card:nth-child(5).vis{transition-delay:.25s;}
.car-card:nth-child(6).vis{transition-delay:.3s;}
.car-card:nth-child(7).vis{transition-delay:.35s;}
.car-card:nth-child(8).vis{transition-delay:.4s;}
.car-card:nth-child(9).vis{transition-delay:.45s;}
.car-card:nth-child(10).vis{transition-delay:.5s;}
.car-card:nth-child(11).vis{transition-delay:.55s;}
.car-card:nth-child(12).vis{transition-delay:.6s;}
.car-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);transform:translateX(-100%);transition:transform .6s;}
.car-card:hover{transform:translateY(-5px);}
.car-card:hover::before{transform:translateX(0);}
.car-badge{position:absolute;top:14px;right:14px;background:var(--gold);color:var(--black);font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;z-index:2;}
[dir="rtl"] .car-badge{right:auto;left:14px;}
.car-img-wrap{width:100%;height:140px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:18px;background:rgba(0,0,0,.2);border-radius:4px;}
.car-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;transition:transform .4s;}
.car-card:hover .car-img-wrap img{transform:scale(1.06);}
.car-name{font-family:var(--ff-display);font-size:20px;font-weight:700;margin-bottom:10px;}
.car-specs-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.car-spec{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--grey);letter-spacing:.5px;}
.car-spec svg{width:12px;height:12px;fill:var(--gold);flex-shrink:0;}
.car-price-wrap{display:flex;align-items:baseline;gap:8px;}
.car-price{font-size:26px;font-weight:700;color:var(--gold);font-family:var(--ff-display);}
.car-price-unit{font-size:12px;color:var(--grey);}
.car-price-summer{font-size:11px;color:var(--grey2);margin-top:2px;}
.btn-book-car{width:100%;margin-top:16px;background:transparent;border:1px solid rgba(201,148,58,.35);color:var(--gold);padding:10px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);font-family:var(--ff-body);white-space:nowrap;position:relative;overflow:hidden;}
.btn-book-car:hover{background:var(--gold);color:var(--black);}

/* ── CONDITIONS ── */
#conditions{padding:96px 5%;background:var(--black);position:relative;overflow:hidden;}
#conditions::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(201,148,58,.04),transparent 70%);pointer-events:none;}
.cond-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.cond-card{background:var(--dark3);padding:40px 30px;position:relative;overflow:hidden;transition:transform .6s cubic-bezier(.16,1,.3,1),box-shadow .6s ease;}
.cond-card:hover{transform:translateY(-8px);box-shadow:0 20px 50px rgba(201,148,58,.1);}
.cond-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);transform:scaleX(0);transition:transform .4s;}
.cond-card:hover::after{transform:scaleX(1);}
.cond-icon{width:50px;height:50px;border:1px solid rgba(201,148,58,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:22px;transition:transform .4s cubic-bezier(.16,1,.3,1);}
.cond-card:hover .cond-icon{transform:rotate(360deg) scale(1.1);}
.cond-icon svg{width:24px;height:24px;fill:var(--gold);}
.cond-title{font-family:var(--ff-display);font-size:18px;font-weight:700;color:var(--gold);margin-bottom:14px;}
.cond-list{list-style:none;}
.cond-list li{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:rgba(247,244,238,.65);line-height:1.7;margin-bottom:8px;}
.cond-list li::before{content:'▸';color:var(--gold);font-size:10px;margin-top:4px;flex-shrink:0;}
[dir="rtl"] .cond-list li{flex-direction:row-reverse;}
[dir="rtl"] .cond-icon{margin-left:auto;margin-right:0;}
[dir="rtl"] .cond-card{text-align:right;}

/* ── HOW ── */
#how{padding:96px 5%;background:var(--dark2);}
.how-grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:0;position:relative;}
.how-grid::before{content:'';position:absolute;top:35px;left:12.5%;right:12.5%;height:1px;background:linear-gradient(90deg,var(--gold-d),var(--gold),var(--gold-d));z-index:0;}
.step{text-align:center;padding:0 18px;position:relative;z-index:1;}
.step-num{width:70px;height:70px;border:1px solid var(--gold);background:var(--dark2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;position:relative;}
.step-num svg{width:28px;height:28px;fill:var(--gold);}
.step-num::before{content:'';position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(201,148,58,.2);}
.step-title{font-size:14px;font-weight:600;color:var(--white);margin-bottom:8px;}
.step-text{font-size:12px;color:var(--grey);line-height:1.7;}

/* ── TESTIMONIALS ── */
#testi{padding:96px 5%;background:var(--black);}
.testi-wrap{max-width:1100px;margin:0 auto;}
.testi-slides-outer{overflow:visible;width:100%;}
.testi-slides{display:flex;gap:20px;transition:transform .5s cubic-bezier(.4,0,.2,1);width:100%;}
.testi-card{flex:0 0 auto;background:var(--dark3);padding:32px;border:1px solid rgba(201,148,58,.07);position:relative;transition:transform .3s,box-shadow .3s;}
.testi-card:hover{transform:translateY(-4px);box-shadow:0 10px 30px rgba(201,148,58,.08);}
.testi-card::before{content:'\201C';position:absolute;top:18px;right:22px;font-family:var(--ff-display);font-size:72px;color:rgba(201,148,58,.12);line-height:1;}
[dir="rtl"] .testi-card::before{right:auto;left:22px;content:'\201D';}
.testi-stars{display:flex;gap:3px;margin-bottom:16px;}
.testi-stars svg{width:14px;height:14px;fill:var(--gold);flex-shrink:0;}
.testi-text{font-size:13px;color:rgba(247,244,238,.65);line-height:1.85;margin-bottom:20px;font-style:italic;}
.testi-name{font-size:13px;font-weight:600;color:var(--white);}
.testi-loc{font-size:10px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.testi-nav{display:flex;justify-content:center;gap:10px;margin-top:36px;}
.t-btn{width:42px;height:42px;border:1px solid rgba(201,148,58,.3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;}
.t-btn:hover{background:var(--gold);border-color:var(--gold);}
.t-btn:hover svg{fill:var(--black);}
.t-btn svg{width:16px;height:16px;fill:var(--white);}

/* ── ADD REVIEW ── */
#add-review{padding:60px 5%;background:var(--dark2);border-top:1px solid rgba(201,148,58,.1);}
.review-form-wrap{max-width:600px;margin:0 auto;}
.review-form-wrap h3{font-family:var(--ff-display);font-size:24px;text-align:center;margin-bottom:8px;}
.review-form-wrap h3 em{color:var(--gold);font-style:italic;}
.review-form-wrap .rev-sub{text-align:center;color:var(--grey);font-size:13px;margin-bottom:28px;}
.rev-ff{margin-bottom:16px;}
.rev-ff label{display:block;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:7px;}
.rev-ff input,.rev-ff textarea{width:100%;background:var(--dark3);border:1px solid rgba(201,148,58,.18);color:var(--white);padding:12px 15px;font-family:var(--ff-body);font-size:13px;outline:none;transition:border-color .3s;}
.rev-ff input:focus,.rev-ff textarea:focus{border-color:var(--gold);}
.rev-ff textarea{resize:vertical;min-height:80px;}
.rev-rating-wrap{display:flex;align-items:center;gap:14px;margin-bottom:20px;justify-content:center;}
.rev-rating-wrap span{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--grey);}
.btn-submit-review{width:100%;background:var(--gold);color:var(--black);padding:14px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;transition:all .4s cubic-bezier(.16,1,.3,1);font-family:var(--ff-body);position:relative;overflow:hidden;}
.btn-submit-review:hover{background:var(--gold-l);transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,148,58,.3);}
.btn-submit-review::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,.2);transform:translate(-50%,-50%);transition:width .6s,height .6s;}
.btn-submit-review:hover::before{width:300px;height:300px;}
.rev-error{color:#e74c3c;font-size:10px;text-align:center;margin-top:8px;display:none;}
.rev-error.show{display:block;}

/* ── CITIES ── */
#cities{padding:96px 5%;background:var(--dark);}
.cities-grid{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:repeat(6,1fr);gap:3px;}
.city-card{position:relative;overflow:hidden;cursor:pointer;aspect-ratio:.7;}
.city-card img{width:100%;height:100%;object-fit:cover;transition:transform .8s cubic-bezier(.16,1,.3,1);filter:brightness(.5) saturate(.7);}
.city-card:hover img{transform:scale(1.15);filter:brightness(.6) saturate(1);}
.city-over{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8),transparent 55%);transition:background .5s ease;}
.city-card:hover .city-over{background:linear-gradient(to top,rgba(201,148,58,.3),transparent 60%);}
.city-nm{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-family:var(--ff-display);font-size:16px;font-weight:700;letter-spacing:.5px;}

/* ── STRIP ── */
#strip{padding:44px 5%;background:var(--dark3);border-top:1px solid rgba(201,148,58,.1);border-bottom:1px solid rgba(201,148,58,.1);}
.strip-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:36px;}
.strip-item{display:flex;align-items:center;gap:14px;}
.strip-icon{width:44px;height:44px;flex-shrink:0;border:1px solid rgba(201,148,58,.28);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.strip-icon svg{width:20px;height:20px;fill:var(--gold);}
.strip-t{font-size:13px;font-weight:600;color:var(--white);margin-bottom:3px;}
.strip-s{font-size:11px;color:var(--grey);}
[dir="rtl"] .strip-item{flex-direction:row-reverse;text-align:right;}

/* ── FOOTER ── */
footer{background:var(--black);padding:60px 5% 28px;border-top:1px solid rgba(201,148,58,.08);}
.footer-inner{max-width:1300px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr;gap:60px;margin-bottom:50px;}
.f-brand{font-family:var(--ff-display);font-size:24px;font-weight:700;color:var(--gold);letter-spacing:3px;display:block;margin-bottom:3px;}
.f-brand small{color:var(--grey);font-size:9px;letter-spacing:4px;text-transform:uppercase;font-family:var(--ff-body);}
.f-desc{color:var(--grey);font-size:13px;line-height:1.8;margin-top:14px;max-width:280px;}
.f-contact{margin-top:22px;}
.f-contact a{display:flex;align-items:center;gap:9px;color:var(--grey);font-size:13px;text-decoration:none;margin-bottom:9px;transition:color .3s;}
.f-contact a:hover{color:var(--gold);}
.f-contact svg{width:14px;height:14px;fill:var(--gold);flex-shrink:0;}
[dir="rtl"] .f-contact a{flex-direction:row-reverse;}
.f-col h4{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:22px;}
.f-col ul{list-style:none;}
.f-col li{margin-bottom:9px;}
.f-col a{color:var(--grey);text-decoration:none;font-size:13px;transition:color .3s;}
.f-col a:hover{color:var(--gold);}
.socials{display:flex;gap:10px;margin-top:18px;}
.soc-btn{width:36px;height:36px;border:1px solid rgba(201,148,58,.28);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;text-decoration:none;}
.soc-btn:hover{background:var(--gold);border-color:var(--gold);}
.soc-btn:hover svg{fill:var(--black);}
.soc-btn svg{width:14px;height:14px;fill:var(--white);}
.f-bottom{border-top:1px solid rgba(255,255,255,.05);padding-top:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.f-bottom p{font-size:11px;color:rgba(136,136,136,.5);letter-spacing:.5px;}

/* ── WA FLOAT ── */
.wa-float{position:fixed;bottom:26px;right:26px;width:54px;height:54px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:998;transition:transform .3s;border:none;animation:waPulse 2.5s infinite;}
@keyframes waPulse{0%{box-shadow:0 0 0 0 rgba(37,211,102,.6);}70%{box-shadow:0 0 0 20px rgba(37,211,102,0);}100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}}
.wa-float:hover{transform:scale(1.1);animation:none;box-shadow:0 4px 18px rgba(37,211,102,.4);}
.wa-float svg{width:26px;height:26px;fill:#fff;}
[dir="rtl"] .wa-float{right:auto;left:26px;}

/* ── MODAL ── */
.modal{display:none;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center;}
.modal.open{display:flex;}
.modal-ov{position:absolute;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);}
.modal-box{position:relative;z-index:1;background:var(--dark3);border:1px solid rgba(201,148,58,.18);padding:44px;max-width:520px;width:92%;max-height:90vh;overflow-y:auto;animation:modalIn .4s cubic-bezier(.16,1,.3,1);}
@keyframes modalIn{from{opacity:0;transform:translateY(30px) scale(.95);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-close{position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--grey);font-size:22px;cursor:pointer;line-height:1;transition:color .3s;}
[dir="rtl"] .modal-close{right:auto;left:14px;}
.modal-close:hover{color:var(--white);}
.modal-title{font-family:var(--ff-display);font-size:28px;font-weight:700;margin-bottom:6px;}
.modal-car{font-family:var(--ff-display);font-size:18px;color:var(--gold);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(201,148,58,.14);}
.modal-sub{font-size:13px;color:var(--grey);margin-bottom:26px;}
.ff{margin-bottom:16px;}
.ff label{display:block;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:7px;}
.ff input,.ff select,.ff textarea{width:100%;background:var(--dark2);border:1px solid rgba(201,148,58,.18);color:var(--white);padding:12px 15px;font-family:var(--ff-body);font-size:13px;outline:none;transition:border-color .3s;}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--gold);}
.ff select option{background:var(--dark3);}
.ff textarea{resize:vertical;min-height:80px;}
.ff input.error,.ff select.error{border-color:#e74c3c !important;box-shadow:0 0 0 1px rgba(231,76,60,.3);}
.error-msg{color:#e74c3c;font-size:10px;margin-top:4px;display:none;letter-spacing:.5px;}
.error-msg.show{display:block;}
.rating-section{border-top:1px solid rgba(201,148,58,.1);padding-top:20px;margin-top:20px;}
.rating-section .rating-label{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;text-align:center;}
.rating-section .rating-sub{font-size:10px;color:var(--grey);text-align:center;margin-bottom:10px;font-style:italic;}
.rating-section .star-rating{justify-content:center;margin-bottom:8px;}
.rating-section .rating-text{text-align:center;font-size:10px;color:var(--grey2);min-height:18px;}
.btn-wa-submit{width:100%;background:var(--green);color:#fff;border:none;padding:14px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:10px;font-family:var(--ff-body);transition:opacity .3s;white-space:nowrap;}
.btn-wa-submit:hover{opacity:.9;}
.btn-wa-submit svg{width:18px;height:18px;fill:#fff;flex-shrink:0;}

/* ── TOAST ── */
.toast{position:fixed;bottom:86px;right:26px;background:var(--dark3);border:1px solid var(--gold);padding:14px 22px;font-size:12px;color:var(--white);z-index:9999;transform:translateY(16px);opacity:0;transition:all .4s;pointer-events:none;max-width:260px;}
[dir="rtl"] .toast{right:auto;left:26px;}
.toast.show{transform:translateY(0);opacity:1;}

/* ── FADE UP ── */
.fu{opacity:0;transform:translateY(24px);transition:opacity .7s,transform .7s;}
.fu.vis{opacity:1;transform:translateY(0);}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .cond-grid{grid-template-columns:repeat(2,1fr);}
  .cities-grid{grid-template-columns:repeat(3,1fr);}
  .how-grid::before{display:none;}
  .how-grid{grid-template-columns:repeat(2,1fr);gap:30px;}
  .footer-inner{grid-template-columns:1fr 1fr;}
  .strip-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:900px){
  .nav-links,.nav-right .btn-nav-cta{display:none;}
  .burger{display:flex;}
  .hero-inner{grid-template-columns:1fr;}
  .hero-car-wrap{display:none;}
  .cars-grid{grid-template-columns:repeat(2,1fr);}
  .cond-grid{grid-template-columns:1fr;}
  .how-grid{grid-template-columns:1fr 1fr;}
  .cities-grid{grid-template-columns:repeat(2,1fr);}
  .footer-inner{grid-template-columns:1fr;}
  .strip-grid{grid-template-columns:1fr 1fr;}
  .testi-slides-outer{overflow:hidden;}
}
@media(max-width:600px){
  .cars-grid{grid-template-columns:1fr;}
  .how-grid{grid-template-columns:1fr;}
  .strip-grid{grid-template-columns:1fr;}
  .cities-grid{grid-template-columns:repeat(2,1fr);}
  .lang-float{bottom:10px;left:10px;}
  [dir="rtl"] .lang-float{left:auto;right:10px;}
  .lang-flag-btn{width:38px;height:38px;font-size:18px;}
  .modal-box{padding:28px 20px;}
}
</style>
</head>

let currentLang = 'fr';
let currentSeason = 'normal';
let currentCar = '';
let tIdx = 0;
let tCardW = 0;
let modalRating = 0;
let reviewRating = 0;

function detectLang(){
  const saved = localStorage.getItem('ruamsefeh_lang');
  if(saved && (saved==='fr'||saved==='en'||saved==='ar')) return saved;
  const bl = navigator.language || navigator.userLanguage || 'fr';
  const lc = bl.toLowerCase().split('-')[0];
  if(lc==='ar') return 'ar';
  if(lc==='fr') return 'fr';
  return 'en';
}

function setLang(lang){
  currentLang = lang;
  localStorage.setItem('ruamsefeh_lang', lang);
  const t = i18n[lang];
  document.title = 'Ru Amsefeh l\'ensemble de l\'artisanat Medina';
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key = el.getAttribute('data-i18n');
    if(t[key] !== undefined) el.textContent = t[key];
  });
  const isAr = lang==='ar';
  document.documentElement.setAttribute('dir', isAr?'rtl':'ltr');
  document.documentElement.setAttribute('lang', lang);
  document.body.style.fontFamily = isAr ? 'var(--ff-ar)' : 'var(--ff-body)';
  document.querySelectorAll('.lang-flag-btn').forEach(b=>b.classList.remove('active'));
  const activeBtn = document.getElementById('lang-'+lang);
  if(activeBtn) activeBtn.classList.add('active');
  buildCars();
  buildConditions();
  buildTestimonials();
  updateModalLabels();
  buildCarSelect();
  resetModalRating();
  resetReviewRating();
  tIdx = 0;
  setTimeout(initSlider, 100);
}

function setModalRating(val){
  modalRating = val;
  document.querySelectorAll('#modal-stars .star').forEach((s,i)=>{s.classList.toggle('active',i<val);});
  const t = i18n[currentLang];
  document.getElementById('modal-rating-text').textContent = t['rate_'+val] || '';
}
function resetModalRating(){
  modalRating = 0;
  document.querySelectorAll('#modal-stars .star').forEach(s=>s.classList.remove('active'));
  document.getElementById('modal-rating-text').textContent = '';
}
function setReviewRating(val){
  reviewRating = val;
  document.querySelectorAll('#review-stars .star').forEach((s,i)=>{s.classList.toggle('active',i<val);});
}
function resetReviewRating(){
  reviewRating = 0;
  document.querySelectorAll('#review-stars .star').forEach(s=>s.classList.remove('active'));
}

function submitReview(){
  const t = i18n[currentLang];
  const name = document.getElementById('rev-name').value.trim();
  const msg = document.getElementById('rev-msg').value.trim();
  const errEl = document.getElementById('rev-error');
  errEl.classList.remove('show');
  if(!name){ errEl.textContent = t.rev_error_name; errEl.classList.add('show'); return; }
  if(!reviewRating){ errEl.textContent = t.rev_error_rate; errEl.classList.add('show'); return; }
  const stars = '⭐'.repeat(reviewRating);
  const text = `مرحباً Ru Amsefeh 👋\n\n*تقييم جديد*\n👤 الاسم: ${name}\n${stars} التقييم: ${reviewRating}/5${msg?'\n📝 تعليق: '+msg:''}\n\nشكراً!`;
  window.open('https://wa.me/212725950908?text='+encodeURIComponent(text),'_blank');
  document.getElementById('rev-name').value = '';
  document.getElementById('rev-msg').value = '';
  resetReviewRating();
  showToast(t.rev_sent, 'success');
}

function buildCars(){
  const t = i18n[currentLang];
  const grid = document.getElementById('cars-grid');
  if(!grid) return;
  grid.innerHTML = '';
  cars.forEach((car,i)=>{
    const price = currentSeason==='summer' ? car.summer : car.price;
    const card = document.createElement('div');
    card.className = 'car-card';
    const gearTxt = car.gear || '';
    const yearTxt = car.year || '';
    card.innerHTML = `
      ${car.badge?`<span class="car-badge">${car.badge}</span>`:''}
      <div class="car-img-wrap"><img src="${car.img}" alt="${car.name}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<span style=color:var(--gold)>${car.name}</span>'"/></div>
      <div class="car-name">${car.name}</div>
      <div class="car-specs-row">
        ${car.gear?`<div class="car-spec"><svg viewBox="0 0 24 24" width="12" height="12" fill="var(--gold)"><circle cx="12" cy="12" r="10"/></svg>${gearTxt}</div>`:''}
        ${yearTxt?`<div class="car-spec"><svg viewBox="0 0 24 24"><path d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>${yearTxt}</div>`:''}
      </div>
      <div class="car-price-wrap"><div class="car-price">${price} DH</div><div class="car-price-unit">${t.per_day}</div></div>
      ${currentSeason==='normal'?`<div class="car-price-summer">${currentLang==='ar'?`الصيف: ${car.summer} درهم`:(currentLang==='en'?`Summer: ${car.summer} MAD`:`Été : ${car.summer} DH`)}</div>`:''}
      <button class="btn-book-car" onclick="openModal('${car.name}')">${t.book_btn}</button>
    `;
    grid.appendChild(card);
    setTimeout(() => card.classList.add('vis'), 50 + (i * 20));
  });
}

function buildTestimonials(){
  const t = i18n[currentLang];
  const slides = document.getElementById('tSlides');
  if(!slides) return;
  slides.innerHTML = '';
  for(let i=1;i<=4;i++){
    const card = document.createElement('div');
    card.className = 'testi-card';
    card.innerHTML = `
      <div class="testi-stars">${'<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>'.repeat(5)}</div>
      <p class="testi-text">${t['t'+i+'_text']}</p>
      <div class="testi-name">${t['t'+i+'_name']}</div>
      <div class="testi-loc">${t['t'+i+'_loc']}</div>
    `;
    slides.appendChild(card);
  }
  initSlider();
}

function buildCarSelect(){
  const t = i18n[currentLang];
  const select = document.getElementById('f-car');
  if(!select) return;
  select.innerHTML = `<option value="">${t.car_choose}</option>`;
  cars.forEach(car=>{
    const opt = document.createElement('option');
    opt.value = car.name;
    opt.textContent = car.name;
    select.appendChild(opt);
  });
  if(currentCar && select.querySelector(`option[value="${currentCar}"]`)){
    select.value = currentCar;
  }
}

function buildConditions(){
  const t = i18n[currentLang];
  ['cond1','cond2','cond3'].forEach(k=>{
    const list = document.getElementById(k+'-list');
    if(list){
      list.innerHTML='';
      t[k].forEach(item=>{const li=document.createElement('li');li.textContent=item;list.appendChild(li);});
    }
  });
}

function setSeason(s){
  currentSeason = s;
  document.getElementById('btn-normal').classList.toggle('active',s==='normal');
  document.getElementById('btn-summer').classList.toggle('active',s==='summer');
  buildCars();
}

function updateModalLabels(){
  const t = i18n[currentLang];
  document.getElementById('m-title').textContent = t.m_title;
  document.getElementById('m-sub').textContent = t.m_sub;
  document.getElementById('l-car').textContent = t.l_car;
  document.getElementById('l-name').textContent = t.l_name;
  document.getElementById('l-phone').textContent = t.l_phone;
  document.getElementById('l-from').textContent = t.l_from;
  document.getElementById('l-start').textContent = t.l_start;
  document.getElementById('l-end').textContent = t.l_end;
  document.getElementById('l-msg').textContent = t.l_msg;
  document.getElementById('m-btn-txt').textContent = t.m_btn;
  document.querySelector('.rating-label').textContent = t.rate_label;
  document.querySelector('.rating-sub').textContent = t.rate_sub;
}

function openModal(carName){
  currentCar = carName;
  updateModalLabels();
  buildCarSelect();
  resetModalRating();
  document.getElementById('m-car').textContent = carName || (currentLang==='ar'?'منتج حسب الاختيار':'Produit au choix');
  clearErrors();
  document.getElementById('f-name').value='';
  document.getElementById('f-phone').value='';
  document.getElementById('f-start').value='';
  document.getElementById('f-end').value='';
  document.getElementById('f-msg').value='';
  if(carName) document.getElementById('f-car').value = carName;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
  clearErrors();
}

function clearErrors(){
  document.querySelectorAll('.ff input, .ff select').forEach(el=>el.classList.remove('error'));
  document.querySelectorAll('.error-msg').forEach(el=>{el.classList.remove('show');el.textContent='';});
}

function showFieldError(fieldId, errId, msg){
  const field = document.getElementById(fieldId);
  const errEl = document.getElementById(errId);
  if(field) field.classList.add('error');
  if(errEl){ errEl.textContent = msg; errEl.classList.add('show'); }
}

function validateAndSend(){
  clearErrors();
  const t = i18n[currentLang];
  let hasError = false;
  const carSelect = document.getElementById('f-car').value;
  const name = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const from = document.getElementById('f-from').value;
  const start = document.getElementById('f-start').value;
  const end = document.getElementById('f-end').value;
  const msg = document.getElementById('f-msg').value.trim();
  if(!carSelect){showFieldError('f-car','err-car',t.val_car);hasError=true;}
  if(!name){showFieldError('f-name','err-name',t.val_name);hasError=true;}
  if(!phone || phone.replace(/[\s\+\-\(\)]/g,'').length<8){showFieldError('f-phone','err-phone',t.val_phone);hasError=true;}
  if(!start || !end){showFieldError('f-start','err-start',t.val_dates);showFieldError('f-end','err-end','');hasError=true;}
  if(start && end){
    const dStart = new Date(start);
    const dEnd = new Date(end);
    if(dEnd <= dStart){showFieldError('f-end','err-end',t.val_end_before_start);hasError=true;}
    const diffDays = Math.ceil((dEnd-dStart)/(1000*60*60*24));
    if(diffDays<3){showFieldError('f-end','err-end',t.val_min3);hasError=true;}
  }
  if(hasError){
    const firstErr = document.querySelector('.ff input.error, .ff select.error');
    if(firstErr) firstErr.scrollIntoView({behavior:'smooth',block:'center'});
    return;
  }
  const car = carSelect;
  const rating = modalRating > 0 ? modalRating : null;
  const text = t.wa_msg(name,car,from,start,end,msg,rating);
  window.open('https://wa.me/212725950908?text='+encodeURIComponent(text),'_blank');
  closeModal();
  showToast(t.toast_msg,'success');
}

function openWA(){
  const t = i18n[currentLang];
  const greeting = currentLang==='ar'?'مرحباً Ru Amsefeh، أريد استفساراً 🛍️':(currentLang==='en'?'Hello Ru Amsefeh, I\'d like to inquire 🛍️':'Bonjour Ru Amsefeh, je souhaite me renseigner 🛍️');
  window.open('https://wa.me/212725950908?text='+encodeURIComponent(greeting),'_blank');
}

function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(type==='error'?'error':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

function toggleMenu(){document.getElementById('mobMenu').classList.toggle('open');}

window.addEventListener('scroll',()=>{
  const nav = document.getElementById('mainNav');
  if(nav) nav.classList.toggle('scrolled', window.scrollY > 80);
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const scrollPercent = (scrollTop / docHeight) * 100;
  document.getElementById('progressBar').style.width = scrollPercent + '%';
});

function initSlider(){
  const outer = document.getElementById('tOuter');
  const slides = document.getElementById('tSlides');
  if(!outer||!slides||slides.children.length===0) return;
  const w = outer.offsetWidth;
  const perView = w > 960 ? 3 : w > 600 ? 2 : 1;
  const gap = 20;
  tCardW = (w - (gap * (perView - 1))) / perView;
  Array.from(slides.children).forEach(c => {
    c.style.flex = '0 0 ' + tCardW + 'px';
    c.style.minWidth = tCardW + 'px';
    c.style.maxWidth = tCardW + 'px';
  });
  slideTesti(0);
}

function slideTesti(dir){
  const slides = document.getElementById('tSlides');
  if(!slides || slides.children.length===0) return;
  const total = slides.children.length;
  const outer = document.getElementById('tOuter');
  const w = outer.offsetWidth;
  const perView = w > 960 ? 3 : w > 600 ? 2 : 1;
  const maxIdx = Math.max(0, total - perView);
  tIdx = Math.max(0, Math.min(tIdx + dir, maxIdx));
  slides.style.transform = `translateX(-${tIdx * (tCardW + 20)}px)`;
}

const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('vis'); });
}, { threshold: 0.08 });

function observeAll(){ document.querySelectorAll('.fu').forEach(el => obs.observe(el)); }

(function(){
  const lang = detectLang();
  currentLang = lang;
  const isAr = lang === 'ar';
  document.documentElement.setAttribute('dir', isAr ? 'rtl' : 'ltr');
  document.documentElement.setAttribute('lang', lang);
  document.body.style.fontFamily = isAr ? 'var(--ff-ar)' : 'var(--ff-body)';
  document.addEventListener('DOMContentLoaded', () => {
    setLang(lang);
    observeAll();
  });
})();

window.addEventListener('resize', () => { tIdx = 0; setTimeout(initSlider, 150); });
</script>
